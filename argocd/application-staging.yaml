# Example: ArgoCD Application for Staging Environment
# This demonstrates how to create a staging version of the application

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: client-tracker-assistant-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: client-tracker
  
  source:
    repoURL: https://github.com/smokingfive/client-tracker-assistant.git
    targetRevision: develop  # Use develop branch for staging
    path: k8s/overlays/staging  # Different overlay for staging
    
  destination:
    server: https://kubernetes.default.svc
    namespace: client-tracker-staging
    
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
        
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
        
  revisionHistoryLimit: 5
  
  info:
    - name: 'Environment'
      value: 'staging'
    - name: 'Description'
      value: 'Staging environment for Client Tracker Assistant'