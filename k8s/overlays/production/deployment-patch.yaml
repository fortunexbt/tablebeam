apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-tracker-api
  namespace: client-tracker
spec:
  template:
    spec:
      containers:
      - name: api
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: MAX_WORKERS
          value: "8"