apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-tracker-api
  namespace: client-tracker
  labels:
    app: client-tracker-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: client-tracker-api
  template:
    metadata:
      labels:
        app: client-tracker-api
    spec:
      serviceAccountName: client-tracker-sa
      containers:
      - name: api
        image: ghcr.io/your-org/client-tracker-assistant:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: OLLAMA_HOST
          valueFrom:
            configMapKeyRef:
              name: client-tracker-config
              key: OLLAMA_HOST
        - name: VECTOR_DB_PATH
          valueFrom:
            configMapKeyRef:
              name: client-tracker-config
              key: VECTOR_DB_PATH
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: client-tracker-config
              key: API_PORT
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: client-tracker-secrets
              key: pinecone-api-key
        - name: PINECONE_INDEX_NAME
          value: "client-tracker-prod"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: vector-db
          mountPath: /data/chroma_db_clients
        - name: client-data
          mountPath: /app/client_tracking.csv
          subPath: client_tracking.csv
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        command: ["python3", "/app/src/api_server.py"]
      volumes:
      - name: vector-db
        persistentVolumeClaim:
          claimName: vector-db-pvc
      - name: client-data
        configMap:
          name: client-data-csv
      initContainers:
      - name: model-loader
        image: ghcr.io/your-org/client-tracker-assistant:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for Ollama service..."
          until curl -s http://ollama-service:11434 > /dev/null; do
            sleep 2
          done
          echo "Pulling required models..."
          curl -X POST http://ollama-service:11434/api/pull -d '{"name": "llama3.2"}'
          curl -X POST http://ollama-service:11434/api/pull -d '{"name": "mxbai-embed-large"}'
          echo "Models loaded successfully"
---
apiVersion: v1
kind: Service
metadata:
  name: client-tracker-api-service
  namespace: client-tracker
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: client-tracker-api
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: client-tracker-sa
  namespace: client-tracker